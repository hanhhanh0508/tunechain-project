version: '3.8'

services:
  mysql_db:
    image: mysql:8.0
    container_name: tunechain_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ''
      MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
      MYSQL_DATABASE: tunechain
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./backend/init_database.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build: 
      context: ./backend
    container_name: tunechain_backend
    restart: always
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    depends_on:
      - mysql_db

volumes:
  db_data: